<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMATSS 拖轮调度系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <h1>🚢 CMATSS 认知多智能体拖轮调度系统</h1>
            <div class="header-actions">
                <span id="status-indicator" class="status-online">● 系统在线</span>
                <button id="voice-toggle" class="voice-btn" title="语音播报开关">🔇 语音关</button>
            </div>
        </header>

        <!-- 状态看板 -->
        <div class="dashboard-bar">
            <div class="dashboard-item">
                <span class="dashboard-label">可用拖轮</span>
                <span id="dash-available" class="dashboard-value">--</span>
            </div>
            <div class="dashboard-item">
                <span class="dashboard-label">总拖轮</span>
                <span id="dash-total" class="dashboard-value">--</span>
            </div>
            <div class="dashboard-item">
                <span class="dashboard-label">待排任务</span>
                <span id="dash-jobs" class="dashboard-value">--</span>
            </div>
            <div class="dashboard-item">
                <span class="dashboard-label">疲劳绿色</span>
                <span id="dash-green" class="dashboard-value green">--</span>
            </div>
            <div class="dashboard-item">
                <span class="dashboard-label">疲劳黄色</span>
                <span id="dash-yellow" class="dashboard-value yellow">--</span>
            </div>
            <div class="dashboard-item">
                <span class="dashboard-label">疲劳红色</span>
                <span id="dash-red" class="dashboard-value red">--</span>
            </div>
            <div class="dashboard-item tide-item">
                <span class="dashboard-label">潮汐</span>
                <span id="dash-tide" class="dashboard-value" style="font-size:0.9rem;">--</span>
            </div>
            <div class="dashboard-item" id="dash-cable-risk" style="display:none;">
                <span class="dashboard-label">缆绳风险</span>
                <span id="dash-cable-label" class="dashboard-value" style="font-size:0.75rem;">--</span>
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧面板: 任务列表 -->
            <aside class="left-panel">
                <div class="panel-header">
                    <h2>📋 待排任务</h2>
                    <div class="panel-header-actions">
                        <button id="select-all-btn" class="btn-icon" title="全选/取消全选">☑ 全选</button>
                        <button id="refresh-jobs" class="btn-icon" title="刷新">🔄</button>
                    </div>
                </div>
                <div id="job-list" class="job-list">
                    <!-- 任务卡片动态生成 -->
                </div>
                <button id="schedule-btn" class="btn-primary">
                    🤖 智能调度
                </button>
            </aside>

            <!-- 中间: 地图 -->
            <section class="map-container">
                <div id="map"></div>
                <!-- 图例 -->
                <div class="map-legend">
                    <div class="legend-item"><span class="dot green"></span> 可用</div>
                    <div class="legend-item"><span class="dot yellow"></span> 警告</div>
                    <div class="legend-item"><span class="dot red"></span> 锁定</div>
                    <div class="legend-item"><span class="dot blue"></span> 作业中</div>
                </div>
            </section>

            <!-- 右侧面板: 方案展示 -->
            <aside class="right-panel">
                <div class="panel-header">
                    <h2>📊 调度方案</h2>
                </div>
                <div id="solution-list" class="solution-list">
                    <div class="empty-state">
                        点击"智能调度"生成方案
                    </div>
                </div>
            </aside>
        </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/main.js"></script>
</body>
</html>
